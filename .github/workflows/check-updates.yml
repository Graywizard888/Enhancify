name: "🔍 Check bcprov & apksigner Updates"

on:
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  actions: write

jobs:
  check-updates:
    runs-on: ubuntu-latest
    env:
      UTILS_DIR: utils
      STAGING_DIR: /tmp/staging
      ARTIFACTS_DIR: /tmp/artifacts

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq jq aria2 xmlstarlet unzip
          echo "✅ Installed: jq, aria2, xmlstarlet, unzip"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Create staging directories
        run: |
          mkdir -p "$STAGING_DIR"
          mkdir -p "$ARTIFACTS_DIR"
          echo "✅ Staging: $STAGING_DIR"
          echo "✅ Artifacts: $ARTIFACTS_DIR"

      - name: Read current versions
        id: current
        run: |
          VF="${UTILS_DIR}/versions.json"

          if [ -f "$VF" ]; then
            BCPROV_VER=$(jq -r '.bcprov.version // "0.0"' "$VF")
            BT_VER=$(jq -r '.build_tools.version // "0.0.0"' "$VF")
            AK_VER=$(jq -r '.apksigner.version // ""' "$VF")
          else
            BCPROV_VER="0.0"
            BT_VER="0.0.0"
            AK_VER=""
          fi

          echo "bcprov=$BCPROV_VER" >> "$GITHUB_OUTPUT"
          echo "build_tools=$BT_VER" >> "$GITHUB_OUTPUT"
          echo "apksigner=$AK_VER" >> "$GITHUB_OUTPUT"

          echo "══════════════════════════════════════"
          echo "  📌 Current Versions"
          echo "  bcprov       : $BCPROV_VER"
          echo "  build-tools  : $BT_VER"
          echo "  apksigner    : $AK_VER"
          echo "══════════════════════════════════════"

      - name: Fetch latest bcprov version
        id: latest_bcprov
        run: |
          echo "🔍 Querying Maven Central..."

          RESP=$(curl -fsSL \
            "https://search.maven.org/solrsearch/select?q=g:org.bouncycastle+AND+a:bcprov-jdk18on&rows=1&wt=json")

          VER=$(echo "$RESP" | jq -r '.response.docs[0].latestVersion')

          if [ -z "$VER" ] || [ "$VER" == "null" ]; then
            echo "❌ Failed to fetch bcprov version"
            exit 1
          fi

          echo "version=$VER" >> "$GITHUB_OUTPUT"
          echo "✅ Latest bcprov: $VER"

      - name: Fetch latest build-tools version
        id: latest_bt
        run: |
          echo "🔍 Fetching Android SDK repository..."

          SDK_XML=$(curl -fsSL "https://dl.google.com/android/repository/repository2-3.xml")

          VERSIONS=$(echo "$SDK_XML" \
            | xmlstarlet sel \
                -N sdk="http://schemas.android.com/sdk/android/repo/repository2/03" \
                -t -m "//sdk:remotePackage[starts-with(@path,'build-tools;')]" \
                -v "sdk:revision/sdk:major" -o "." \
                -v "sdk:revision/sdk:minor" -o "." \
                -v "sdk:revision/sdk:micro" -n 2>/dev/null || true)

          if [ -z "$VERSIONS" ]; then
            VERSIONS=$(echo "$SDK_XML" \
              | grep -oP 'path="build-tools;[^"]*"' \
              | grep -oP '[\d]+\.[\d]+\.[\d]+' \
              | sort -V)
          fi

          LATEST=$(echo "$VERSIONS" | sort -V | tail -1)

          if [ -z "$LATEST" ]; then
            echo "❌ Failed to get build-tools version"
            exit 1
          fi

          echo "version=$LATEST" >> "$GITHUB_OUTPUT"
          echo "✅ Latest build-tools: $LATEST"

          # ── Resolve download URL ──
          BT_PATH="build-tools;${LATEST}"

          DL_FILE=$(echo "$SDK_XML" \
            | xmlstarlet sel \
                -N sdk="http://schemas.android.com/sdk/android/repo/repository2/03" \
                -t -m "//sdk:remotePackage[@path='${BT_PATH}']//sdk:archive[sdk:host-os='linux']" \
                -v ".//sdk:url" -n 2>/dev/null | head -1 || true)

          [ -z "$DL_FILE" ] && DL_FILE="build-tools_r${LATEST}-linux.zip"

          DL_URL="https://dl.google.com/android/repository/${DL_FILE}"
          echo "download_url=$DL_URL" >> "$GITHUB_OUTPUT"
          echo "📦 URL: $DL_URL"

      - name: Compare versions
        id: compare
        run: |
          CUR_BC="${{ steps.current.outputs.bcprov }}"
          NEW_BC="${{ steps.latest_bcprov.outputs.version }}"
          CUR_BT="${{ steps.current.outputs.build_tools }}"
          NEW_BT="${{ steps.latest_bt.outputs.version }}"

          BC_UP="false"; BT_UP="false"; NEED="false"

          echo "══════════════════════════════════════"
          if [ "$CUR_BC" != "$NEW_BC" ]; then
            BC_UP="true"; NEED="true"
            echo "  bcprov      : $CUR_BC → $NEW_BC 🆕"
          else
            echo "  bcprov      : $CUR_BC ✅"
          fi

          if [ "$CUR_BT" != "$NEW_BT" ]; then
            BT_UP="true"; NEED="true"
            echo "  build-tools : $CUR_BT → $NEW_BT 🆕"
          else
            echo "  build-tools : $CUR_BT ✅"
          fi
          echo "══════════════════════════════════════"

          echo "bcprov_updated=$BC_UP" >> "$GITHUB_OUTPUT"
          echo "bt_updated=$BT_UP" >> "$GITHUB_OUTPUT"
          echo "needs_update=$NEED" >> "$GITHUB_OUTPUT"

      - name: Get source file sizes
        if: steps.compare.outputs.needs_update == 'true'
        id: source_sizes
        run: |
          BC_VER="${{ steps.latest_bcprov.outputs.version }}"
          BC_URL="https://repo1.maven.org/maven2/org/bouncycastle/bcprov-jdk18on/${BC_VER}/bcprov-jdk18on-${BC_VER}.jar"
          BT_URL="${{ steps.latest_bt.outputs.download_url }}"

          echo "🔍 Fetching source sizes..."

          BC_SRC=$(curl -fsSLI "$BC_URL" | grep -i content-length | tail -1 | awk '{print $2}' | tr -d '\r')
          BT_SRC=$(curl -fsSLI "$BT_URL" | grep -i content-length | tail -1 | awk '{print $2}' | tr -d '\r')

          echo "bcprov=${BC_SRC:-0}" >> "$GITHUB_OUTPUT"
          echo "build_tools=${BT_SRC:-0}" >> "$GITHUB_OUTPUT"

          echo "  bcprov source      : ${BC_SRC:-unknown} bytes"
          echo "  build-tools source : ${BT_SRC:-unknown} bytes"

      - name: "⬇️ [1/2] Download build-tools & extract apksigner.jar"
        if: steps.compare.outputs.needs_update == 'true'
        id: dl_apksigner
        run: |
          BT_VER="${{ steps.latest_bt.outputs.version }}"
          DL_URL="${{ steps.latest_bt.outputs.download_url }}"

          echo "══════════════════════════════════════════════════"
          echo "  STEP 1/2 : Download & Extract apksigner.jar"
          echo "  Build-Tools : ${BT_VER}"
          echo "  URL         : ${DL_URL}"
          echo "══════════════════════════════════════════════════"

          aria2c \
            --dir="$STAGING_DIR" \
            --out="build-tools.zip" \
            --split=8 \
            --min-split-size=5M \
            --max-connection-per-server=5 \
            --file-allocation=none \
            --disk-cache=32M \
            --enable-http-pipelining=true \
            --connect-timeout=10 \
            --timeout=60 \
            --retry-wait=2 \
            --max-tries=5 \
            --auto-file-renaming=false \
            --allow-overwrite=true \
            --console-log-level=notice \
            --summary-interval=10 \
            --check-certificate=true \
            --stream-piece-selector=geom \
            "$DL_URL"

          ZIP="$STAGING_DIR/build-tools.zip"

          if [ ! -f "$ZIP" ]; then
            echo "❌ Build-tools download FAILED"
            exit 1
          fi

          ZIP_SIZE=$(stat -c%s "$ZIP")
          ZIP_HUMAN=$(numfmt --to=iec-i --suffix=B "$ZIP_SIZE")

          SRC_SIZE="${{ steps.source_sizes.outputs.build_tools }}"
          echo ""
          echo "  📏 ZIP Size Check:"
          echo "     Source (Content-Length) : ${SRC_SIZE} bytes"
          echo "     Downloaded             : ${ZIP_SIZE} bytes"

          if [ "$SRC_SIZE" != "0" ] && [ "$SRC_SIZE" != "$ZIP_SIZE" ]; then
            echo "  ❌ ZIP SIZE MISMATCH! Aborting."
            rm -f "$ZIP"
            exit 1
          elif [ "$SRC_SIZE" != "0" ]; then
            echo "  ✅ ZIP size matches source"
          else
            echo "  ⚠️ Source size unknown, skipping"
          fi

          echo ""
          echo "  🔍 Locating apksigner.jar in ZIP..."
          ENTRY=$(unzip -l "$ZIP" | grep "lib/apksigner.jar" | head -1)
          echo "     Entry: $ENTRY"

          EXPECTED_SIZE=$(echo "$ENTRY" | awk '{print $1}')

          if [ -z "$EXPECTED_SIZE" ] || [ "$EXPECTED_SIZE" == "0" ]; then
            echo "  ❌ apksigner.jar NOT found in ZIP"
            rm -f "$ZIP"
            exit 1
          fi

          echo "     Expected size: ${EXPECTED_SIZE} bytes"

          echo ""
          echo "  📂 Extracting apksigner.jar to staging..."
          unzip -jo "$ZIP" "*/lib/apksigner.jar" -d "$STAGING_DIR" 2>/dev/null

          EXTRACTED="$STAGING_DIR/apksigner.jar"

          if [ ! -f "$EXTRACTED" ]; then
            echo "  ❌ Extraction FAILED"
            rm -f "$ZIP"
            exit 1
          fi

          ACTUAL_SIZE=$(stat -c%s "$EXTRACTED")
          ACTUAL_HUMAN=$(numfmt --to=iec-i --suffix=B "$ACTUAL_SIZE")

          echo ""
          echo "  📏 Extraction Size Check:"
          echo "     ZIP listing (expected) : ${EXPECTED_SIZE} bytes"
          echo "     Extracted (actual)     : ${ACTUAL_SIZE} bytes"

          if [ "$EXPECTED_SIZE" != "$ACTUAL_SIZE" ]; then
            echo "  ❌ EXTRACTION SIZE MISMATCH!"
            rm -f "$ZIP" "$EXTRACTED"
            exit 1
          fi
          echo "  ✅ Extraction size matches"

          if ! file "$EXTRACTED" | grep -qi "java archive\|zip"; then
            echo "  ❌ Not a valid JAR file"
            rm -f "$ZIP" "$EXTRACTED"
            exit 1
          fi

          AK_VER=$(java -jar "$EXTRACTED" version 2>/dev/null || echo "unknown")
          SHA256=$(sha256sum "$EXTRACTED" | awk '{print $1}')

          ARTIFACT_NAME="apksigner_${AK_VER}.jar"
          cp "$EXTRACTED" "$ARTIFACTS_DIR/${ARTIFACT_NAME}"

          echo ""
          echo "  ══════════════════════════════════════"
          echo "  ✅ apksigner.jar READY in staging"
          echo "     Version  : ${AK_VER}"
          echo "     Size     : ${ACTUAL_HUMAN} (${ACTUAL_SIZE} bytes)"
          echo "     SHA-256  : ${SHA256}"
          echo "     Artifact : ${ARTIFACT_NAME}"
          echo "  ══════════════════════════════════════"

          echo "version=$AK_VER" >> "$GITHUB_OUTPUT"
          echo "artifact_name=$ARTIFACT_NAME" >> "$GITHUB_OUTPUT"
          echo "size=$ACTUAL_SIZE" >> "$GITHUB_OUTPUT"
          echo "size_human=$ACTUAL_HUMAN" >> "$GITHUB_OUTPUT"
          echo "sha256=$SHA256" >> "$GITHUB_OUTPUT"
          echo "bt_version=$BT_VER" >> "$GITHUB_OUTPUT"
          echo "bt_zip_size=$ZIP_HUMAN" >> "$GITHUB_OUTPUT"

          rm -f "$ZIP"
          echo "  🗑️ Build-tools ZIP removed from staging"

      - name: "⬇️ [2/2] Download bcprov JAR"
        if: steps.compare.outputs.needs_update == 'true'
        id: dl_bcprov
        run: |
          VERSION="${{ steps.latest_bcprov.outputs.version }}"
          JAR_NAME="bcprov-jdk18on-${VERSION}.jar"
          ARTIFACT_NAME="bcprov-jdk18on_${VERSION}.jar"

          URL_MAVEN="https://repo1.maven.org/maven2/org/bouncycastle/bcprov-jdk18on/${VERSION}/${JAR_NAME}"
          URL_SONATYPE="https://repo.maven.apache.org/maven2/org/bouncycastle/bcprov-jdk18on/${VERSION}/${JAR_NAME}"

          echo "══════════════════════════════════════════════════"
          echo "  STEP 2/2 : Download bcprov"
          echo "  Version  : ${VERSION}"
          echo "  JAR      : ${JAR_NAME}"
          echo "══════════════════════════════════════════════════"

          aria2c \
            --dir="$STAGING_DIR" \
            --out="${JAR_NAME}" \
            --split=3 \
            --min-split-size=2M \
            --max-connection-per-server=3 \
            --file-allocation=none \
            --disk-cache=10M \
            --enable-http-pipelining=true \
            --connect-timeout=5 \
            --timeout=15 \
            --retry-wait=1 \
            --max-tries=5 \
            --auto-file-renaming=false \
            --allow-overwrite=true \
            --console-log-level=notice \
            --check-certificate=true \
            "${URL_MAVEN}" "${URL_SONATYPE}"

          FILE="$STAGING_DIR/${JAR_NAME}"

          if [ ! -f "$FILE" ]; then
            echo "❌ bcprov download FAILED"
            exit 1
          fi

          DL_SIZE=$(stat -c%s "$FILE")
          DL_HUMAN=$(numfmt --to=iec-i --suffix=B "$DL_SIZE")
          SHA256=$(sha256sum "$FILE" | awk '{print $1}')

          SRC_SIZE="${{ steps.source_sizes.outputs.bcprov }}"
          echo ""
          echo "  📏 Size Check:"
          echo "     Source (Content-Length) : ${SRC_SIZE} bytes"
          echo "     Downloaded             : ${DL_SIZE} bytes"

          if [ "$SRC_SIZE" != "0" ] && [ "$SRC_SIZE" != "$DL_SIZE" ]; then
            echo "  ❌ SIZE MISMATCH!"
            rm -f "$FILE"
            exit 1
          elif [ "$SRC_SIZE" != "0" ]; then
            echo "  ✅ Size matches source"
          else
            echo "  ⚠️ Source size unknown, skipping"
          fi

          if [ "$DL_SIZE" -lt 1000000 ]; then
            echo "  ❌ File too small: ${DL_SIZE} bytes (expected >1 MB)"
            rm -f "$FILE"
            exit 1
          fi

          if ! file "$FILE" | grep -qi "java archive\|zip"; then
            echo "  ❌ Not a valid JAR"
            rm -f "$FILE"
            exit 1
          fi

          echo ""
          echo "  🔐 Verifying checksum..."
          BASE_URL="https://repo1.maven.org/maven2/org/bouncycastle/bcprov-jdk18on/${VERSION}"

          REMOTE_HASH=$(curl -fsSL "${BASE_URL}/${JAR_NAME}.sha256" 2>/dev/null || \
                        curl -fsSL "${BASE_URL}/${JAR_NAME}.sha1" 2>/dev/null || echo "")

          if [ -n "$REMOTE_HASH" ]; then
            REMOTE_HASH=$(echo "$REMOTE_HASH" | awk '{print $1}')
            LOCAL_256=$(sha256sum "$FILE" | awk '{print $1}')
            LOCAL_1=$(sha1sum "$FILE" | awk '{print $1}')

            if [ "$REMOTE_HASH" == "$LOCAL_256" ] || [ "$REMOTE_HASH" == "$LOCAL_1" ]; then
              echo "  ✅ Checksum verified"
            else
              echo "  ❌ Checksum MISMATCH!"
              echo "     Remote : $REMOTE_HASH"
              echo "     SHA-256: $LOCAL_256"
              echo "     SHA-1  : $LOCAL_1"
              rm -f "$FILE"
              exit 1
            fi
          else
            echo "  ⚠️ No remote checksum available"
          fi

          cp "$FILE" "$ARTIFACTS_DIR/${ARTIFACT_NAME}"

          echo ""
          echo "  ══════════════════════════════════════"
          echo "  ✅ bcprov READY in staging"
          echo "     JAR     : ${JAR_NAME}"
          echo "     Size    : ${DL_HUMAN} (${DL_SIZE} bytes)"
          echo "     SHA-256 : ${SHA256}"
          echo "     Artifact: ${ARTIFACT_NAME}"
          echo "  ══════════════════════════════════════"

          echo "jar_name=$JAR_NAME" >> "$GITHUB_OUTPUT"
          echo "artifact_name=$ARTIFACT_NAME" >> "$GITHUB_OUTPUT"
          echo "size=$DL_SIZE" >> "$GITHUB_OUTPUT"
          echo "size_human=$DL_HUMAN" >> "$GITHUB_OUTPUT"
          echo "sha256=$SHA256" >> "$GITHUB_OUTPUT"

      - name: "🔒 [VALIDATE] Both artifacts in staging"
        if: steps.compare.outputs.needs_update == 'true'
        run: |
          echo "══════════════════════════════════════════════════"
          echo "  🔒 VALIDATION — BOTH ARTIFACTS IN STAGING"
          echo "══════════════════════════════════════════════════"

          ERRORS=0
          PASS=0

          check() {
            local N=$1 D=$2 R=$3 DETAIL=$4
            if [ "$R" -eq 0 ]; then
              PASS=$((PASS + 1))
              echo "  [$N] ✅ $D"
            else
              ERRORS=$((ERRORS + 1))
              echo "  [$N] ❌ $D"
            fi
            [ -n "$DETAIL" ] && echo "       $DETAIL"
          }

          AK="$STAGING_DIR/apksigner.jar"
          BC="$STAGING_DIR/${{ steps.dl_bcprov.outputs.jar_name }}"

          echo ""
          echo "  ── apksigner.jar (downloaded first) ──"

          [ -f "$AK" ]
          check "1/8" "apksigner.jar exists in staging" $? "$AK"

          file "$AK" | grep -qi "java archive\|zip"
          check "2/8" "apksigner is valid JAR" $?

          AK_TEST=$(java -jar "$AK" version 2>/dev/null || echo "")
          [ -n "$AK_TEST" ]
          check "3/8" "apksigner executes" $? "version: $AK_TEST"

          NATIVE=$(jar tf "$AK" 2>/dev/null | grep -cE '\.(so|dll|dylib)$' || echo "0")
          [ "$NATIVE" -eq 0 ]
          check "4/8" "No native binaries (ARM safe)" $? "native files: $NATIVE"

          echo ""
          echo "  ── bcprov JAR (downloaded second) ──"

          [ -f "$BC" ]
          check "5/8" "bcprov JAR exists in staging" $? "$BC"

          file "$BC" | grep -qi "java archive\|zip"
          check "6/8" "bcprov is valid JAR" $?

          BC_SIZE=$(stat -c%s "$BC" 2>/dev/null || echo "0")
          [ "$BC_SIZE" -gt 1000000 ]
          check "7/8" "bcprov size > 1 MB" $? "$(numfmt --to=iec-i --suffix=B $BC_SIZE)"

          jar tf "$BC" 2>/dev/null | grep -q "org/bouncycastle"
          check "8/8" "bcprov contains BouncyCastle classes" $?

          echo ""
          echo "══════════════════════════════════════════════════"
          TOTAL=$((PASS + ERRORS))
          if [ "$ERRORS" -gt 0 ]; then
            echo "  ❌ VALIDATION FAILED: ${PASS}/${TOTAL}"
            echo ""
            echo "  ⚠️ Staging files will NOT replace repository files."
            echo "  ⚠️ Old files in utils/ remain UNTOUCHED."
            echo "══════════════════════════════════════════════════"
            exit 1
          fi

          echo "  ✅ ALL PASSED: ${PASS}/${TOTAL}"
          echo ""
          echo "  ✅ Safe to replace old files in repository."
          echo "══════════════════════════════════════════════════"

      - name: "📦 Upload apksigner test artifact"
        if: steps.compare.outputs.needs_update == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: "${{ steps.dl_apksigner.outputs.artifact_name }}"
          path: "${{ env.ARTIFACTS_DIR }}/${{ steps.dl_apksigner.outputs.artifact_name }}"
          retention-days: 30
          compression-level: 0

      - name: "📦 Upload bcprov test artifact"
        if: steps.compare.outputs.needs_update == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: "${{ steps.dl_bcprov.outputs.artifact_name }}"
          path: "${{ env.ARTIFACTS_DIR }}/${{ steps.dl_bcprov.outputs.artifact_name }}"
          retention-days: 30
          compression-level: 0

      - name: Update versions.json
        if: steps.compare.outputs.needs_update == 'true'
        run: |
          TS=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          BC_VER="${{ steps.latest_bcprov.outputs.version }}"
          BT_VER="${{ steps.latest_bt.outputs.version }}"
          AK_VER="${{ steps.dl_apksigner.outputs.version }}"

          jq -n \
            --arg bc_ver "$BC_VER" \
            --arg bc_jar "bcprov-jdk18on-${BC_VER}.jar" \
            --argjson bc_size ${{ steps.dl_bcprov.outputs.size }} \
            --arg bc_sha "${{ steps.dl_bcprov.outputs.sha256 }}" \
            --arg bc_url "https://repo1.maven.org/maven2/org/bouncycastle/bcprov-jdk18on/${BC_VER}/bcprov-jdk18on-${BC_VER}.jar" \
            --arg bt_ver "$BT_VER" \
            --arg bt_url "${{ steps.latest_bt.outputs.download_url }}" \
            --arg ak_ver "$AK_VER" \
            --argjson ak_size ${{ steps.dl_apksigner.outputs.size }} \
            --arg ak_sha "${{ steps.dl_apksigner.outputs.sha256 }}" \
            --arg ak_from "build-tools-${BT_VER}" \
            --arg ts "$TS" \
            '{
              bcprov: {
                version: $bc_ver,
                artifact: "bcprov-jdk18on",
                jar_file: $bc_jar,
                jar_size_bytes: $bc_size,
                sha256: $bc_sha,
                download_url: $bc_url,
                updated_at: $ts
              },
              build_tools: {
                version: $bt_ver,
                source: "android-sdk",
                download_url: $bt_url,
                updated_at: $ts
              },
              apksigner: {
                version: $ak_ver,
                jar_file: "apksigner.jar",
                jar_size_bytes: $ak_size,
                sha256: $ak_sha,
                extracted_from: $ak_from,
                arm_compatible: true,
                updated_at: $ts
              }
            }' > "${UTILS_DIR}/versions.json"

          echo "📝 versions.json:"
          cat "${UTILS_DIR}/versions.json"

      - name: Build PR body
        if: steps.compare.outputs.needs_update == 'true'
        id: pr_meta
        run: |
          BC_VER="${{ steps.latest_bcprov.outputs.version }}"
          BT_VER="${{ steps.latest_bt.outputs.version }}"
          AK_VER="${{ steps.dl_apksigner.outputs.version }}"

          BRANCH="update/deps-bc${BC_VER}-bt${BT_VER}"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"

          cat > /tmp/pr_body.md << EOF
          ## 🔄 Dependency Update

          ### 📊 Version Changes

          | Component | Current | New | Status |
          |-----------|---------|-----|--------|
          | **bcprov-jdk18on** | \`${{ steps.current.outputs.bcprov }}\` | \`${BC_VER}\` | $( [ "${{ steps.compare.outputs.bcprov_updated }}" == "true" ] && echo "🆕 Updated" || echo "✅ Same" ) |
          | **Build-Tools** | \`${{ steps.current.outputs.build_tools }}\` | \`${BT_VER}\` | $( [ "${{ steps.compare.outputs.bt_updated }}" == "true" ] && echo "🆕 Updated" || echo "✅ Same" ) |
          | **apksigner** | \`${{ steps.current.outputs.apksigner }}\` | \`${AK_VER}\` | 🔧 Extracted |

          ---

          ### 📱 apksigner Details

          | Property | Value |
          |----------|-------|
          | **apksigner Version** | \`${AK_VER}\` |
          | **Build-Tools Version** | \`${BT_VER}\` |
          | **File** | \`apksigner.jar\` |
          | **Size** | \`${{ steps.dl_apksigner.outputs.size_human }}\` (${{ steps.dl_apksigner.outputs.size }} bytes) |
          | **SHA-256** | \`${{ steps.dl_apksigner.outputs.sha256 }}\` |
          | **Build-Tools ZIP** | \`${{ steps.dl_apksigner.outputs.bt_zip_size }}\` |
          | **Size Verified** | ✅ ZIP source ↔ download ↔ extraction |
          | **ARM Compatible** | ✅ Pure Java bytecode |

          ---

          ### 🏗️ Bouncy Castle Provider Details

          | Property | Value |
          |----------|-------|
          | **Version** | \`${BC_VER}\` |
          | **File** | \`bcprov-jdk18on-${BC_VER}.jar\` |
          | **Size** | \`${{ steps.dl_bcprov.outputs.size_human }}\` (${{ steps.dl_bcprov.outputs.size }} bytes) |
          | **SHA-256** | \`${{ steps.dl_bcprov.outputs.sha256 }}\` |
          | **Size Verified** | ✅ Source Content-Length ↔ download |
          | **Checksum Verified** | ✅ Maven Central SHA |
          | **Maven** | [Link](https://repo1.maven.org/maven2/org/bouncycastle/bcprov-jdk18on/${BC_VER}/) |
